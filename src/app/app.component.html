<div class="app-wrapper" [class.dark]="themeService.isDarkMode$ | async">
  <ng-container *ngIf="vm$ | async as vm">
    <div class="toast-message" [class.toast-visible]="vm.toastVisible">
      <span class="toast-icon">⚠️</span>
      <div class="toast-body">
        <span class="toast-title">Invalid Input</span>
        <span class="toast-desc">{{ vm.toastMessage }}</span>
      </div>
    </div>
  </ng-container>
  <router-outlet></router-outlet>
</div>
