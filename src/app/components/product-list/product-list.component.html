<app-header></app-header>

<div class="bottom-bar" *ngIf="orderService.grandQty > 0">
  <button class="btn btn-continue" (click)="showPreview()">
    🧾 &nbsp;View Order Summary &nbsp;→
  </button>
</div>

<main class="container">
  <ng-container
    *ngFor="let group of orderService.productGroups; trackBy: groupTrackBy"
  >
    <app-product-card *ngIf="group.visible" [group]="group"></app-product-card>
  </ng-container>
</main>
